services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: walkie
      POSTGRES_USER: walkie
      POSTGRES_PASSWORD: walkie_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walkie -d walkie"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: walkie
      DB_USER: walkie
      DB_PASSWORD: walkie_secret
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
